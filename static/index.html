<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub 热榜 · 每日 / 每周 / 每月</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="icon" href="https://github.githubassets.com/favicons/favicon.svg" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">

          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
          1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
          0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09
          2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65
          3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <div>
          <h1>GitHub 热榜</h1>
          <p class="subtitle">按 star 数排序,带中文翻译的 GitHub Trending</p>
        </div>
      </div>
      <button id="refresh-btn" class="refresh-btn" title="刷新当前榜单">
        <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
          <path fill="currentColor" d="M8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1
          4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.001
          7.001 0 0 1 14.95 7.16a.75.75 0 1 1-1.49.178A5.501 5.501 0 0 0 8 2.5ZM1.705
          8.005a.75.75 0 0 1 .834.656 5.501 5.501 0 0 0 9.592 2.97l-1.204-1.204a.25.25
          0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.001
          7.001 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834Z"/>
        </svg>
        刷新
      </button>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-period="daily" role="tab">今日</button>
    <button class="tab" data-period="weekly" role="tab">本周</button>
    <button class="tab" data-period="monthly" role="tab">本月</button>
  </nav>

  <main class="container">
    <div id="meta" class="meta"></div>
    <div id="status" class="status" hidden></div>
    <div id="repo-list" class="repo-list"></div>
  </main>

  <footer class="footer">
    <p>数据来源 <a href="https://github.com/trending" target="_blank" rel="noopener">github.com/trending</a> ·
    中文翻译由 Google Translate 提供,仅供参考 ·
    数据由 GitHub Actions 每小时自动更新</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
